<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NL2SQL Clinic Assistant</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 1.5rem 2rem;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      text-align: center;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f8fafc;
    }

    header p {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: 0.25rem;
    }

    main {
      width: 100%;
      max-width: 960px;
      padding: 2rem 1rem;
      flex: 1;
    }

    .input-area {
      display: flex;
      gap: 0.5rem;
    }

    #question {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      color: #f8fafc;
      outline: none;
      transition: border-color 0.2s;
    }

    #question:focus { border-color: #6366f1; }

    #question::placeholder { color: #64748b; }

    #ask-btn {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #ask-btn:hover { background: #4f46e5; }
    #ask-btn:disabled { background: #475569; cursor: not-allowed; }

    .examples {
      margin-top: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .examples button {
      padding: 0.35rem 0.7rem;
      font-size: 0.78rem;
      border: 1px solid #334155;
      border-radius: 6px;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.15s;
    }

    .examples button:hover { border-color: #6366f1; color: #c7d2fe; }

    #result {
      margin-top: 1.5rem;
      display: none;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card h3 {
      font-size: 0.85rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.6rem;
    }

    #message-text {
      font-size: 1rem;
      line-height: 1.6;
      color: #e2e8f0;
    }

    #sql-code {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.85rem;
      background: #0f172a;
      color: #a5b4fc;
      padding: 0.75rem;
      border-radius: 6px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    #data-table th {
      background: #334155;
      color: #e2e8f0;
      padding: 0.5rem 0.75rem;
      text-align: left;
      font-weight: 600;
    }

    #data-table td {
      padding: 0.45rem 0.75rem;
      border-bottom: 1px solid #1e293b;
      color: #cbd5e1;
    }

    #data-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    #data-table tr:hover td { background: rgba(99,102,241,0.08); }

    .row-count {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 0.4rem;
    }

    #chart-container { min-height: 300px; }

    #error-box {
      display: none;
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      background: rgba(239,68,68,0.1);
      border: 1px solid #ef4444;
      color: #fca5a5;
    }

    .spinner {
      display: none;
      margin: 2rem auto;
      width: 36px;
      height: 36px;
      border: 3px solid #334155;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .input-area { flex-direction: column; }
      #ask-btn { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <h1>NL2SQL Clinic Assistant</h1>
  <p>Ask questions about clinic data in plain English</p>
</header>

<main>
  <div class="input-area">
    <input id="question" type="text" placeholder="e.g. Show me the top 5 patients by total spending" autofocus />
    <button id="ask-btn">Ask</button>
  </div>

  <div class="examples">
    <button>How many patients do we have?</button>
    <button>Show revenue by doctor</button>
    <button>Which city has the most patients?</button>
    <button>Top 5 patients by spending</button>
    <button>Show unpaid invoices</button>
    <button>Monthly appointment count</button>
  </div>

  <div class="spinner" id="spinner"></div>
  <div id="error-box"></div>

  <div id="result">
    <div class="card">
      <h3>Answer</h3>
      <div id="message-text"></div>
    </div>

    <div class="card">
      <h3>Generated SQL</h3>
      <pre id="sql-code"></pre>
    </div>

    <div class="card" id="table-card">
      <h3>Results</h3>
      <div style="overflow-x:auto">
        <table id="data-table"></table>
      </div>
      <div class="row-count" id="row-count"></div>
    </div>

    <div class="card" id="chart-card" style="display:none">
      <h3>Chart</h3>
      <div id="chart-container"></div>
    </div>
  </div>
</main>

<script>
  const qInput   = document.getElementById('question');
  const askBtn   = document.getElementById('ask-btn');
  const spinner  = document.getElementById('spinner');
  const errorBox = document.getElementById('error-box');
  const resultEl = document.getElementById('result');

  // example chips
  document.querySelectorAll('.examples button').forEach(btn => {
    btn.addEventListener('click', () => { qInput.value = btn.textContent; ask(); });
  });

  qInput.addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });
  askBtn.addEventListener('click', ask);

  async function ask() {
    const question = qInput.value.trim();
    if (!question) return;

    spinner.style.display = 'block';
    errorBox.style.display = 'none';
    resultEl.style.display = 'none';
    askBtn.disabled = true;

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || `Error ${res.status}`);
      }

      const data = await res.json();
      renderResult(data);
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
    } finally {
      spinner.style.display = 'none';
      askBtn.disabled = false;
    }
  }

  function renderResult(data) {
    document.getElementById('message-text').textContent = data.message || '';
    document.getElementById('sql-code').textContent = data.sql_query || '';

    // table
    const table = document.getElementById('data-table');
    table.innerHTML = '';
    const cols = data.columns || [];
    const rows = data.rows || [];

    if (cols.length) {
      const thead = table.createTHead();
      const hr = thead.insertRow();
      cols.forEach(c => { const th = document.createElement('th'); th.textContent = c; hr.appendChild(th); });

      const tbody = table.createTBody();
      rows.forEach(row => {
        const tr = tbody.insertRow();
        cols.forEach(c => { const td = tr.insertCell(); td.textContent = row[c] ?? ''; });
      });
    }

    document.getElementById('row-count').textContent =
      data.row_count != null ? `${data.row_count} row(s) returned` : '';

    // chart
    const chartCard = document.getElementById('chart-card');
    const chartDiv  = document.getElementById('chart-container');
    chartDiv.innerHTML = '';

    if (data.chart && data.chart.data && data.chart.data.length) {
      chartCard.style.display = 'block';
      Plotly.newPlot(chartDiv, data.chart.data, {
        ...data.chart.layout,
        paper_bgcolor: '#1e293b',
        plot_bgcolor:  '#1e293b',
        font: { color: '#e2e8f0' },
        margin: { t: 40, r: 20, b: 50, l: 60 }
      }, { responsive: true });
    } else {
      chartCard.style.display = 'none';
    }

    resultEl.style.display = 'block';
  }
</script>
</body>
</html>
